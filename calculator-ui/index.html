<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>

    <style>
        body {
            background: #e6ecf0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculator {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            padding: 14px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .num { background: #f1f1f1; }
        .operator { background: #ff9f43; color: white; }
        .equal { background: #2ecc71; color: white; }
        .clear { background: #e74c3c; color: white; }
        .special { background: #bdc3c7; }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" disabled>

        <div class="buttons">

            <!-- Row 1 -->
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="special" onclick="backspace()">X</button>
            <button class="special" onclick="toggleSign()">+/-</button>
            <button class="operator" onclick="append('/')">/</button>

            <!-- Row 2 -->
            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">*</button>

            <!-- Row 3 -->
            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">-</button>

            <!-- Row 4 -->
            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>

            <!-- Row 5 -->
            <button class="special" onclick="percentage()">%</button>
            <button class="num" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
